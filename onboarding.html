<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CalGovCC — Start Your Free Trial</title>
<meta name="robots" content="noindex"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;1,6..96,400&family=Cormorant:ital,wght@1,500&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--ink:#0F2A6A;--white:#fff;--line:rgba(255,255,255,.12);--green:#6EE7A8;--cyan:#5bd3ff;--red:#F87171;--gold:#C9A84C;--disp:'Bodoni Moda',Georgia,serif;--subdisp:'Cormorant',Georgia,serif;--body:'Jost',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--body);color:rgba(255,255,255,.75);font-weight:300;line-height:1.7;min-height:100vh;background:linear-gradient(160deg,#0c2257,#070e1e 60%,#040914);display:flex;align-items:center;justify-content:center;padding:24px}
body::before{content:'';position:fixed;inset:0;pointer-events:none;opacity:.025;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:180px}
.card{position:relative;z-index:1;width:min(560px,100%);background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:14px;padding:clamp(28px,5vw,48px)}
.brand{display:flex;align-items:center;gap:10px;margin-bottom:28px}
.mark{width:36px;height:36px;border-radius:8px;background:#fff;color:var(--ink);font-weight:700;font-size:.8rem;display:grid;place-items:center;font-family:var(--body)}
.bname{font-family:var(--disp);font-size:1rem;color:#fff}
.eyebrow{font-size:10px;font-weight:500;letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:10px}
h1{font-family:var(--disp);font-weight:400;font-size:clamp(1.8rem,4vw,2.4rem);color:#fff;line-height:1.1;margin-bottom:8px}
h1 em{font-family:var(--subdisp);font-style:italic;color:rgba(255,255,255,.5)}
.sub{color:rgba(255,255,255,.5);font-size:.92rem;line-height:1.7;margin-bottom:24px}
.free-badge{display:inline-flex;align-items:center;gap:7px;background:rgba(110,231,168,.08);border:1px solid rgba(110,231,168,.25);border-radius:999px;padding:.35rem .9rem;font-size:.7rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--green);margin-bottom:22px}
.free-badge::before{content:"●";font-size:.55em}
label{display:block;font-size:.58rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.4);margin:0 0 7px}
input,textarea{width:100%;font-family:var(--body);font-size:.95rem;font-weight:300;color:#fff;background:rgba(255,255,255,.06);border:1px solid var(--line);border-radius:8px;padding:.8rem .95rem;margin-bottom:18px;transition:border-color .2s}
input:focus,textarea:focus{outline:none;border-color:rgba(91,211,255,.5)}
textarea{min-height:80px;resize:vertical;line-height:1.6}
.hint{font-size:.75rem;color:rgba(255,255,255,.35);margin:-12px 0 18px;line-height:1.5}
.btn{width:100%;font-family:var(--body);font-size:.8rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--ink);background:var(--cyan);border:none;border-radius:10px;padding:1rem;cursor:pointer;transition:.2s;margin-top:4px}
.btn:hover{background:#7fe0ff;transform:translateY(-1px)}
.btn:disabled{opacity:.6;cursor:wait;transform:none}
.msg{margin-top:12px;text-align:center;font-size:.86rem;min-height:18px}
.msg.err{color:var(--red)}
.login-link{margin-top:18px;text-align:center;font-size:.8rem;color:rgba(255,255,255,.4)}
.login-link a{color:rgba(91,211,255,.8);border-bottom:1px solid rgba(91,211,255,.3)}
</style>
</head>
<body>
<div class="card">
  <div class="brand">
    <span class="mark">CA</span>
    <span class="bname">California Government Contracts Center</span>
  </div>

  <div class="eyebrow">Free Trial</div>
  <h1>Find your next California <em>government contract.</em></h1>
  <p class="sub">Tell us about your business and we'll match open California state, county, city, and district bids to what you deliver — in seconds.</p>

  <div class="free-badge">Free Trial &mdash; No credit card required</div>

  <label for="biz">Business name</label>
  <input id="biz" type="text" placeholder="Acme Group LLC" autocomplete="organization"/>

  <label for="name">Your name</label>
  <input id="name" type="text" placeholder="Jane Smith" autocomplete="name"/>

  <label for="email">Email address</label>
  <input id="email" type="email" placeholder="you@yourbusiness.com" autocomplete="email"/>

  <button class="btn" id="startBtn">Select My Services &rarr;</button>
  <div class="msg" id="msg"></div>

  <p class="login-link">Already a member? <a href="/login.html">Sign in</a></p>
</div>

<script>
'use strict';
document.getElementById('startBtn').addEventListener('click', function() {
  var msg = document.getElementById('msg');
  msg.className = 'msg'; msg.textContent = '';

  var biz   = document.getElementById('biz').value.trim();
  var name  = document.getElementById('name').value.trim();
  var email = document.getElementById('email').value.trim();

  if (!biz)   { msg.className = 'msg err'; msg.textContent = 'Please enter your business name.'; return; }
  if (!email) { msg.className = 'msg err'; msg.textContent = 'Please enter your email address.'; return; }

  var btn = document.getElementById('startBtn');
  btn.disabled = true; btn.textContent = 'Continuing…';

  // Store basic profile — keywords set on services.html
  var profile = { business_name: biz, name: name, email: email, keywords: [], commodity_codes: [], state: 'CA' };
  localStorage.setItem('calgcc_profile', JSON.stringify(profile));

  // Set free trial session
  var session = { token: 'free_trial_' + Date.now(), state: 'CA', business_name: biz, keywords: [], free_trial: true };
  localStorage.setItem('calgcc_session', JSON.stringify(session));

  location.href = '/services.html';
});

document.getElementById('email').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') { e.preventDefault(); document.getElementById('startBtn').click(); }
});
</script>
</body>
</html>
